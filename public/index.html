const DART_BASE = "https://opendart.fss.or.kr/api";
const DART_PROXY = "/api/dart/proxy?url=";

function normalizeName(name) {
  return name
    .replace(/^\(주\)|^주식회사\s*/,"")
    .replace(/\(주\)$|\s*주식회사$/,"")
    .trim();
}

async function dartFetch(url) {
  // DART API는 CORS 때문에 서버 프록시 경유
  const r = await fetch(DART_PROXY + encodeURIComponent(url));
  if (!r.ok) throw new Error(`DART fetch 실패: ${r.status}`);
  return r;
}

async function dartGetCorpCode(key, name) {
  try {
    const tryNames = [name, normalizeName(name)].filter((v,i,a)=>a.indexOf(v)===i);
    for (const n of tryNames) {
      const r = await dartFetch(`${DART_BASE}/list.json?crtfc_key=${key}&corp_name=${encodeURIComponent(n)}&page_count=5&sort=date&sort_mth=desc`);
      const j = await r.json();
      if (j.status === "000" && j.list?.length) return j.list[0].corp_code;
    }
    return null;
  } catch { return null; }
}

async function dartGetFinancials(key, corpCode, year) {
  try {
    for (const reprtCode of ["11011", "11004"]) {
      const r = await dartFetch(`${DART_BASE}/fnlttSinglAcnt.json?crtfc_key=${key}&corp_code=${corpCode}&bsns_year=${year}&reprt_code=${reprtCode}`);
      const j = await r.json();
      if (j.status !== "000" || !j.list) continue;
      const find = (...kws) => {
        for (const kw of kws) {
          const row = j.list.find(x => x.account_nm?.trim() === kw && x.fs_div === "CFS")
                   || j.list.find(x => x.account_nm?.trim() === kw);
          if (row) return Math.round(parseInt(row.thstrm_amount?.replace(/,/g,"") || "0") / 1e8);
        }
        return null;
      };
      const result = {
        revenue: find("매출액","수익(매출액)","영업수익","매출"),
        operatingProfit: find("영업이익","영업이익(손실)"),
        netIncome: find("당기순이익","당기순이익(손실)","분기순이익"),
      };
      if (result.revenue || result.operatingProfit || result.netIncome) return result;
    }
    return null;
  } catch { return null; }
}

async function dartGetReportText(key, corpName) {
  try {
    const corpCode = await dartGetCorpCode(key, corpName);
    if (!corpCode) return { text: null, error: "기업을 DART에서 찾을 수 없습니다" };

    // 정기공시(A: 상장사 사업보고서) + 외감법인(F: 비상장 감사보고서) 순서로 검색
    let filing = null;
    for (const pblntf_ty of ["A", "F"]) {
      const filingR = await dartFetch(`${DART_BASE}/list.json?crtfc_key=${key}&corp_code=${corpCode}&pblntf_ty=${pblntf_ty}&page_count=10&sort=date&sort_mth=desc`);
      const filingJ = await filingR.json();
      filing = filingJ.list?.find(f =>
        f.report_nm.includes("사업보고서") || f.report_nm.includes("감사보고서")
      );
      if (filing) break;
    }
    if (!filing) return { text: null, error: "DART에서 사업보고서/감사보고서를 찾을 수 없습니다" };

    // zip은 CORS 이슈 있을 수 있어서 프록시 경유
    const docR = await dartFetch(`${DART_BASE}/document.json?crtfc_key=${key}&rcept_no=${filing.rcept_no}`);
    const docBuf = await docR.arrayBuffer();

    const zip = await JSZip.loadAsync(docBuf);
    let allText = "";
    for (const [filename, file] of Object.entries(zip.files)) {
      const name = filename.toLowerCase();
      if (!name.endsWith(".xml") && !name.endsWith(".html") && !name.endsWith(".htm")) continue;
      try {
        // EUC-KR 인코딩 감지 후 디코딩 (DART XML 다수가 EUC-KR)
        const rawBuf = await file.async("arraybuffer");
        let content;
        try {
          content = new TextDecoder("euc-kr").decode(rawBuf);
          // EUC-KR 디코딩 실패 신호: 한글이 없으면 UTF-8 재시도
          if (!/[\uAC00-\uD7A3]/.test(content)) {
            content = new TextDecoder("utf-8").decode(rawBuf);
          }
        } catch {
          content = new TextDecoder("utf-8").decode(rawBuf);
        }
        const text = content.replace(/<[^>]+>/g," ").replace(/&[a-zA-Z]+;/g," ").replace(/\s+/g," ").trim();
        allText += text + "\n";
      } catch {}
    }
    const idx = allText.search(/사업의\s*내용/);
    const extracted = idx !== -1 ? allText.slice(idx, idx + 30000) : allText.slice(0, 30000);
    return { text: extracted || null, reportName: filing.report_nm, reportDate: filing.rcept_dt, corpCode,
             error: extracted ? null : "보고서에서 텍스트를 추출할 수 없습니다" };
  } catch(e) {
    return { text: null, error: e.message };
  }
}
async function enrichWithDart(key, parsed, onProgress) {
  const clone = JSON.parse(JSON.stringify(parsed));
  const koreans = clone.categories.flatMap((cat, ci) =>
    (cat.companies || []).map((co, coi) => ({ co, ci, coi }))
  ).filter(({ co }) => !co.country || co.country === "KR");
  let done = 0;
  // DART API 과부하 방지: 5개씩 청크로 나눠 순차 처리
  const chunkSize = 5;
  for (let i = 0; i < koreans.length; i += chunkSize) {
    const chunk = koreans.slice(i, i + chunkSize);
    await Promise.all(chunk.map(async ({ co, ci, coi }) => {
      try {
        const corpCode = await dartGetCorpCode(key, co.name);
        if (corpCode) {
          const [f23, f24] = await Promise.all([
            dartGetFinancials(key, corpCode, 2023),
            dartGetFinancials(key, corpCode, 2024),
          ]);
          if (f23 || f24) {
            clone.categories[ci].companies[coi].financials = {
              revenue: [f23?.revenue??null, f24?.revenue??null],
              operatingProfit: [f23?.operatingProfit??null, f24?.operatingProfit??null],
              netIncome: [f23?.netIncome??null, f24?.netIncome??null],
            };
            clone.categories[ci].companies[coi].dartVerified = true;
          }
        }
      } catch { /* 개별 기업 실패 시 무시하고 계속 */ }
      done++; onProgress(done, koreans.length);
    }));
  }
  return clone;
}

  );
}

// ── 메인 앱 ───────────────────────────────────────────
function App() {
  const [input, setInput] = useState("");
  const [dartKey, setDartKey] = useState("");
  const [loading, setLoading] = useState(false);
  const [dartProgress, setDartProgress] = useState(null);
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const [history, setHistory] = useState([]);
  const [showDrop, setShowDrop] = useState(false);
  const [selectedCompany, setSelectedCompany] = useState(null);
  const [selectedCategory, setSelectedCategory] = useState(null);
  const timerRef = useRef(null);
  const inputRef = useRef(null);
  const dropRef = useRef(null);

  

  // 드롭다운 외부 클릭 닫기
  useEffect(() => {
    const handler = e => {
      if (dropRef.current && !dropRef.current.contains(e.target)) setShowDrop(false);
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  // 자동완성 후보 = 히스토리 + 기본 추천 (입력값 필터링)
  const suggestions = input.trim().length > 0
    ? [...new Set([...history, ...SUGGESTIONS])].filter(s => s.includes(input.trim()) && s !== input.trim()).slice(0, 8)
    : [...new Set([...history, ...SUGGESTIONS])].slice(0, 8);

  const goHome = useCallback(() => {
    setData(null); setError(null); setInput(""); setShowDrop(false);
  }, []);

  const analyze = useCallback(async (keyword) => {
    const q = (keyword || input).trim();
    if (!q) return;
    setInput(q);
    setShowDrop(false);
    setHistory(prev => [q, ...prev.filter(h => h !== q)].slice(0, 10));
    setLoading(true); setError(null); setData(null); setDartProgress(null);
    try {
      // DART 원문 사전 조회 (dartKey 있을 때만)
      let dartReportText = null;
      let dartReportName = null;
      let dartFetchError = null;
      if (dartKey.trim()) {
        try {
          const dartData = await dartGetReportText(dartKey.trim(), q);
          if (dartData.text) {
            dartReportText = dartData.text;
            dartReportName = dartData.reportName + " (" + dartData.reportDate + ")";
          } else {
            dartFetchError = dartData.error || "DART 원문 조회 실패";
          }
        } catch(e) {
          dartFetchError = e.message;
        }
      }

      // Claude에게 보낼 메시지 구성
      const userMsg = dartReportText
        ? `분석 대상 기업: ${q}
이것은 기업명입니다. MODE A로 분석하세요.

아래는 DART에서 직접 가져온 실제 보고서 원문입니다 (${dartReportName}):

===DART 원문 시작===
${dartReportText}
===DART 원문 끝===

분석 지침:
1. 위 원문을 1차 출처로 사용하여 원재료/매입처, 판매경로/주요매출처, 경쟁현황, 신규사업을 추출.
2. 비상장 기업인 경우, 가장 유사한 상장 경쟁사의 사업보고서·감사보고서·증권신고서를 웹에서 추가 검색하여 사업 영역을 보완할 것.
3. 원문에 없는 업체는 유사 상장사 공시에서 근거가 있을 때만 추가. 순수 추정 금지.
4. basis 필드에 출처(감사보고서 섹션명 또는 유사 상장사 공시명)를 반드시 명시.
- 원재료/매입처 → suppliers
- 판매경로/주요매출처 → customers
- 경쟁사/경쟁현황 → competitors
- 신규사업/인접사업 → adjacent
- 분석 대상 기업 자체 → target (1개만)`
        : `분석 대상: ${q}

먼저 입력값이 기업명인지 섹터/산업명인지 판단해줘.

[기업명인 경우 — MODE A]
DART에서 "${q}" 공시를 직접 찾지 못했거나 원문 추출에 실패했다.
다음 순서로 반드시 진행할 것:

1. 가장 유사한 상장 경쟁사를 먼저 파악하고, 해당 경쟁사의 DART 사업보고서·감사보고서·증권신고서를 검색해서 사업의 내용, 원재료, 매출처, 경쟁현황을 확인할 것.
2. "${q}"에 대해 웹에서 공개된 사업 정보(홈페이지, 언론보도 등)도 추가 검색할 것.
3. 위 두 출처에서 확인된 사실만 사용. 순수 추정 금지.
4. basis 필드에 출처(유사 상장사 공시명 또는 언론보도)를 반드시 명시.
5. sourceNote에 "DART 원문 미확보 — [참조한 유사 상장사명] 공시 기반 분석"을 명시.

[섹터/산업명인 경우 — MODE B]
해당 산업의 전통적 밸류체인(원재료 공급 → 소재/부품 가공 → 핵심 제조 → 유통/판매 → 최종소비자) 프레임워크로 분석해줘.
학술적으로 타당한 산업 분석 근거(Porter Value Chain, 주요 산업 보고서 등)를 basis에 명시해줘.
각 단계별 주요 플레이어를 국내외 포함하여 나열해줘. 규모 필터 없이 해당 단계의 주요 플레이어를 모두 포함해줘.`;

      // DART fetch 실패 에러 노출 — 단, DART 원문이 없고 기업명 검색인 경우만 (섹터 검색엔 해당 없음)
      // dartReportText가 null인데 dartFetchError가 있고, 입력이 섹터가 아닌 기업명처럼 보일 때만
      if (dartKey.trim() && dartFetchError && !dartReportText) {
        // 에러를 throw하지 않고 사용자에게 경고만 표시 후 웹서치 fallback으로 진행
        console.warn("DART 원문 조회 실패, 웹서치로 fallback:", dartFetchError);
      }

      const res = await fetch("/api/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","anthropic-beta":"prompt-caching-2024-07-31"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:32000,
          system:[{type:"text", text:SYSTEM_PROMPT, cache_control:{type:"ephemeral"}}],
          tools: [{type:"web_search_20250305",name:"web_search"}],
          messages:[{role:"user",content:userMsg}],
        }),
      });
      const result = await res.json();
      if (!res.ok) {
        const errMsg = result?.error?.message || result?.message || JSON.stringify(result);
        throw new Error(`API ${res.status}: ${errMsg}`);
      }
      const raw = result.content.filter(b=>b.type==="text").map(b=>b.text).join("");
      let parsed;
      // 1차: 중괄호 depth 추적으로 완전한 JSON 객체 추출
      const extractJSON = (str) => {
        const start = str.indexOf("{");
        if (start === -1) return null;
        let depth = 0, inStr = false, escape = false;
        for (let i = start; i < str.length; i++) {
          const c = str[i];
          if (escape) { escape = false; continue; }
          if (c === "\\" && inStr) { escape = true; continue; }
          if (c === '"') inStr = !inStr;
          if (!inStr) {
            if (c === "{") depth++;
            else if (c === "}") { depth--; if (depth === 0) return str.slice(start, i+1); }
          }
        }
        return null;
      };
      let jsonStr = extractJSON(raw);
      if (!jsonStr) throw new Error("JSON 파싱 실패: 응답에서 JSON을 찾을 수 없습니다\n\n[응답 앞부분]: " + raw.slice(0, 200));
      // citation 태그 제거 (웹서치 결과가 JSON 오염시키는 경우)
      jsonStr = jsonStr.replace(/<cite[^>]*>|<\/cite>/g, "");
      try { parsed = JSON.parse(jsonStr); }
      catch(_) {
        // 2차: 백틱·제어문자 제거 후 재시도
        jsonStr = jsonStr.replace(/`/g,"").replace(/[\x00-\x1F\x7F]/g, m => m==="\n"||m==="\r"||m==="\t"?"":m);
        try { parsed = JSON.parse(jsonStr); }
        catch(e2) { throw new Error("JSON 파싱 실패: " + e2.message.slice(0,80)); }
      }
      if (dartKey.trim()) {
        clearInterval(timerRef.current);
        
        const korCount = parsed.categories.flatMap(c=>c.companies||[]).filter(co=>!co.country||co.country==="KR").length;
        if (korCount > 0) {
          setDartProgress({done:0,total:korCount});
          parsed = await enrichWithDart(dartKey.trim(), parsed, (done,total)=>setDartProgress({done,total}));
        }
      }
      // 3번 오류 방지: financials 구조 정규화 (배열 아닌 경우 보정)
      parsed.categories?.forEach(cat => {
        (cat.companies||[]).forEach(co => {
          if (co.financials) {
            ["revenue","operatingProfit","netIncome"].forEach(key => {
              const v = co.financials[key];
              if (v == null) { co.financials[key] = [null, null]; }
              else if (!Array.isArray(v)) { co.financials[key] = [null, typeof v === "number" ? v : null]; }
              else if (v.length === 1) { co.financials[key] = [null, v[0]]; }
            });
          } else {
            co.financials = { revenue:[null,null], operatingProfit:[null,null], netIncome:[null,null] };
          }
        });
      });
      // 4번 오류 방지: period 누락 시 기본값
      if (!parsed.period || !Array.isArray(parsed.period) || parsed.period.length < 2) {
        parsed.period = ["'23", "'24"];
      }
      setData(parsed);
    } catch(err) {
      setError(err.message);
    } finally {
      clearInterval(timerRef.current);
      setLoading(false); setDartProgress(null);
    }
  }, [input, dartKey]);

  // 엑셀 내보내기
  const exportExcel = useCallback(() => {
    if (!data) return;
    const wb = XLSX.utils.book_new();

    // 시트1: 밸류체인 기업 목록
    const p = data.period || ["'23","'24"];
    const rows = [["카테고리","포지션","공시근거","기업명","상장여부","거래소","국가","태그",
      `매출(${p[0]},억)`,`매출(${p[1]},억)`,`영업이익(${p[0]})`,`영업이익(${p[1]})`,
      `당기순이익(${p[0]})`,`당기순이익(${p[1]})`,`DART검증`,"특이사항"]];
    data.categories?.forEach(cat => {
      cat.companies?.forEach(co => {
        rows.push([
          cat.name, cat.position, cat.basis||"",
          co.name, co.listed?"상장":"비상장",
          co.exchange||"", co.country||"",
          (co.tags||[]).join(", "),
          co.financials?.revenue?.[0]??"",
          co.financials?.revenue?.[1]??"",
          co.financials?.operatingProfit?.[0]??"",
          co.financials?.operatingProfit?.[1]??"",
          co.financials?.netIncome?.[0]??"",
          co.financials?.netIncome?.[1]??"",
          co.dartVerified?"✓":"",
          co.notes||"",
        ]);
      });
    });
    const ws1 = XLSX.utils.aoa_to_sheet(rows);
    ws1["!cols"] = [14,10,30,18,8,8,6,20,10,10,10,10,10,10,8,30].map(wch=>({wch}));
    XLSX.utils.book_append_sheet(wb, ws1, "밸류체인");

    // 시트2: 분석 개요
    const infoRows = [
      ["분석 대상", data.target||""],
      ["모드", data.mode||""],
      ["요약", data.summary||""],
      ["참조 출처", data.sourceNote||""],
      ["분석 기간", (data.period||[]).join(", ")],
      ["분석일", new Date().toLocaleDateString("ko-KR")],
    ];
    const ws3 = XLSX.utils.aoa_to_sheet(infoRows);
    ws3["!cols"] = [{wch:14},{wch:60}];
    XLSX.utils.book_append_sheet(wb, ws3, "개요");

    XLSX.writeFile(wb, `CHAINMAP_${data.target}_${new Date().toISOString().slice(0,10)}.xlsx`);
  }, [data]);

  const dartCount = data?.categories?.flatMap(c=>c.companies||[]).filter(co=>co.dartVerified).length||0;
  const totalCos = data?.categories?.reduce((s,c)=>s+(c.companies?.length||0),0)||0;

  return (
    <div style={{minHeight:"100vh",background:T.bg,color:T.text,transition:"background 0.3s"}}>
      {/* 기업 상세 모달 */}
      {selectedCompany && (
        <CompanyModal
          company={selectedCompany}
          category={selectedCategory}
          periods={data?.period||["'23","'24"]}
          T={T}
          onClose={()=>{setSelectedCompany(null);setSelectedCategory(null);}}
        />
      )}

      {/* Header */}
      <div style={{background:T.headerBg,borderBottom:`1px solid ${T.headerBorder}`,padding:"14px 28px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",position:"sticky",top:0,zIndex:100,boxShadow:T.shadow}}>
        <div onClick={goHome} style={{cursor:"pointer",userSelect:"none"}} className="no-print">
          <div style={{fontSize:20,fontWeight:900,color:T.logoColor,letterSpacing:3}}>CHAIN<span style={{color:T.logoText}}>MAP</span></div>
          <div style={{fontSize:9,color:T.faint,letterSpacing:2}}>SUPPLY CHAIN INTELLIGENCE</div>
        </div>

        {/* 검색창 + 자동완성 드롭다운 — 결과/로딩 중일 때만 헤더에 표시 */}
        {(loading || data || error) && (
        <div ref={dropRef} style={{flex:1,maxWidth:480,position:"relative",marginLeft:24}} className="no-print">
          <div style={{display:"flex",gap:8}}>
            <input ref={inputRef} value={input} onChange={e=>{setInput(e.target.value);setShowDrop(true);}}
              onFocus={()=>setShowDrop(true)}
              onKeyDown={e=>{if(e.key==="Enter"&&!loading&&dartKey)analyze();if(e.key==="Escape")setShowDrop(false);}}
              placeholder={dartKey?"기업명 또는 섹터 (예: 삼성전자, 반도체, 2차전지)":"DART API Key를 입력하세요"}
              disabled={!dartKey}
              style={{flex:1,background:dartKey?T.inputBg:"#f1f5f9",border:`1px solid ${dartKey?T.inputBorder:"#cbd5e1"}`,borderRadius:8,padding:"9px 14px",color:dartKey?T.text:"#94a3b8",fontSize:13,outline:"none",cursor:dartKey?"text":"not-allowed"}}/>
            <button onClick={()=>analyze()} disabled={loading||!input.trim()||!dartKey} style={{
              background:(loading||!dartKey)?"#94a3b8":"linear-gradient(135deg,#3b82f6,#2563eb)",
              color:"#fff",border:"none",borderRadius:8,padding:"9px 24px",
              fontSize:13,fontWeight:700,cursor:loading?"not-allowed":"pointer",whiteSpace:"nowrap",
              boxShadow:loading?"none":"0 2px 8px rgba(37,99,235,0.3)"}}>
              {loading?"분석 중...":"분석"}
            </button>
          </div>
          {/* 드롭다운 — 히스토리만 */}
          {showDrop && suggestions.length > 0 && (
            <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:60,background:T.dropBg,border:`1px solid ${T.dropBorder}`,borderRadius:8,boxShadow:"0 4px 20px rgba(0,0,0,0.12)",zIndex:200,overflow:"hidden"}}>
              {history.length > 0 && input.trim() === "" && (
                <div style={{padding:"6px 12px 2px",fontSize:10,color:T.faint,fontWeight:700}}>최근 검색</div>
              )}
              {suggestions.map((s,i) => (
                <div key={i} onMouseDown={()=>analyze(s)} style={{
                  padding:"9px 14px",fontSize:13,color:T.text,cursor:"pointer",
                  display:"flex",alignItems:"center",gap:8,
                  background:T.dropBg,
                }}
                  onMouseEnter={e=>e.currentTarget.style.background=T.dropHover}
                  onMouseLeave={e=>e.currentTarget.style.background=T.dropBg}>
                  <span style={{color:T.faint,fontSize:11}}>{history.includes(s)?"🕐":"🔍"}</span>
                  {s}
                </div>
              ))}
            </div>
          )}
        </div>
        )}

        {data && (
          <button onClick={exportExcel} className="no-print" style={{
            background:"linear-gradient(135deg,#16a34a,#15803d)",color:"#fff",
            border:"none",borderRadius:8,padding:"8px 16px",fontSize:12,
            cursor:"pointer",fontWeight:700,whiteSpace:"nowrap",
            boxShadow:"0 2px 8px rgba(22,163,74,0.3)"}}>
            📊 엑셀
          </button>
        )}

        {data && (
          <button onClick={()=>window.print()} className="no-print" style={{
            background:"linear-gradient(135deg,#ef4444,#dc2626)",color:"#fff",
            border:"none",borderRadius:8,padding:"8px 16px",fontSize:12,
            cursor:"pointer",fontWeight:700,whiteSpace:"nowrap",
            boxShadow:"0 2px 8px rgba(220,38,38,0.3)"}}>
            📄 PDF
          </button>
        )}

        {data && (
          <div style={{marginLeft:"auto",textAlign:"right"}}>
            <div style={{fontSize:16,fontWeight:900,color:T.text}}>{data.target}</div>
            <div style={{fontSize:10,color:T.subtext}}>{data.summary}</div>
          </div>
        )}
      </div>

      {/* 고정 범례 서브헤더 */}
      {data && (
        <div style={{background:T.headerBg,borderBottom:`1px solid ${T.headerBorder}`,padding:"7px 28px",display:"flex",alignItems:"center",gap:20,flexWrap:"wrap",boxShadow:"none"}} className="no-print">
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontSize:10,color:T.faint,fontWeight:700}}>재무</span>
            {[{n:1,l:"매출",bg:"#2563eb"},{n:2,l:"영업이익",bg:"#16a34a"},{n:3,l:"당기순익",bg:"#7c3aed"}].map(({n,l,bg})=>(
              <div key={n} style={{display:"flex",alignItems:"center",gap:4}}>
                <span style={{width:16,height:16,background:bg,borderRadius:3,color:"#fff",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700}}>{n}</span>
                <span style={{fontSize:10,color:T.subtext}}>{l}</span>
              </div>
            ))}
          </div>
          <div style={{width:1,height:16,background:T.headerBorder}}/>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontSize:10,color:T.faint,fontWeight:700}}>출처</span>
            {[["#0f172a","DART"],["#1d4ed8","웹출처"],["#dc2626","추정"]].map(([color,label])=>(
              <div key={label} style={{display:"flex",alignItems:"center",gap:4}}>
                <span style={{width:8,height:8,borderRadius:"50%",background:color,display:"inline-block"}}/>
                <span style={{fontSize:10,color,fontWeight:600}}>{label}</span>
              </div>
            ))}
          </div>
          <div style={{marginLeft:"auto",fontSize:10,color:T.faint}}>(단위: 억원)</div>
        </div>
      )}

      {/* Main */}
      <div style={{padding:"24px 28px"}}>

            {/* 중앙 검색창 */}
            <div ref={dropRef} style={{width:"100%",maxWidth:560,position:"relative",marginBottom:16}}>
              {!dartKey && (
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,padding:"10px 14px",background:"#fef3c7",border:"1px solid #f59e0b",borderRadius:8}}>
                  <span style={{fontSize:15}}>🔑</span>
                  <span style={{fontSize:13,color:"#92400e",fontWeight:600}}>DART API Key를 먼저 입력해 주세요</span>
                </div>
              )}
              <div style={{display:"flex",gap:8}}>
                <input ref={inputRef} value={input} onChange={e=>{setInput(e.target.value);setShowDrop(true);}}
                  onFocus={()=>setShowDrop(true)}
                  onKeyDown={e=>{if(e.key==="Enter"&&!loading&&dartKey)analyze();if(e.key==="Escape")setShowDrop(false);}}
                  placeholder={dartKey?"기업명 또는 섹터 (예: 삼성전자, 반도체, 2차전지)":"DART API Key를 입력하세요"}
                  disabled={!dartKey}
                  style={{flex:1,background:dartKey?T.inputBg:"#f1f5f9",border:`1px solid ${dartKey?T.inputBorder:"#cbd5e1"}`,borderRadius:10,padding:"13px 18px",color:dartKey?T.text:"#94a3b8",fontSize:15,outline:"none",boxShadow:"0 2px 8px rgba(0,0,0,0.06)",cursor:dartKey?"text":"not-allowed"}}/>
                <button onClick={()=>analyze()} disabled={loading||!input.trim()||!dartKey} style={{
                  background:(loading||!dartKey)?"#94a3b8":"linear-gradient(135deg,#3b82f6,#2563eb)",
                  color:"#fff",border:"none",borderRadius:10,padding:"13px 28px",
                  fontSize:15,fontWeight:700,cursor:loading?"not-allowed":"pointer",whiteSpace:"nowrap",
                  boxShadow:loading?"none":"0 2px 8px rgba(37,99,235,0.3)"}}>
                  분석
                </button>
              </div>
              {/* 히스토리 드롭다운 */}
              {showDrop && suggestions.length > 0 && (
                <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:90,background:T.dropBg,border:`1px solid ${T.dropBorder}`,borderRadius:8,boxShadow:"0 4px 20px rgba(0,0,0,0.12)",zIndex:200,overflow:"hidden"}}>
                  <div style={{padding:"6px 12px 2px",fontSize:10,color:T.faint,fontWeight:700}}>최근 검색</div>
                  {suggestions.map((s,i) => (
                    <div key={i} onMouseDown={()=>analyze(s)} style={{padding:"9px 14px",fontSize:13,color:T.text,cursor:"pointer",display:"flex",alignItems:"center",gap:8,background:T.dropBg}}
                      onMouseEnter={e=>e.currentTarget.style.background=T.dropHover}
                      onMouseLeave={e=>e.currentTarget.style.background=T.dropBg}>
                      <span style={{color:T.faint,fontSize:11}}>🕐</span>{s}
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* DART 입력창 — 검색창 바로 아래 */}
            <div style={{width:"100%",maxWidth:560,background:T.dartBg,border:`1px solid ${T.dartBorder}`,borderRadius:10,padding:"14px 18px"}}>
              <div style={{fontSize:11,color:T.dartText,fontWeight:700,marginBottom:8}}>⚙ DART Open API Key <span style={{fontWeight:400,opacity:0.7}}>(선택 — 국내 기업 공시 재무 검증)</span></div>
              <input value={dartKey} onChange={e=>setDartKey(e.target.value)}
                placeholder="발급받은 DART API Key 입력 (40자리) · opendart.fss.or.kr에서 무료 발급"
                type="password"
                style={{width:"100%",background:T.cardBg,border:`1px solid ${T.dartBorder}`,borderRadius:8,padding:"9px 14px",color:T.text,fontSize:12,outline:"none"}}/>
              {dartKey && <div style={{marginTop:6,fontSize:11,color:T.dartText}}>✓ 설정됨 — 다음 분석부터 적용</div>}
            </div>
          </div>
        )}

        {loading && (
          <div style={{textAlign:"center",paddingTop:100}}>
            <div style={{display:"inline-block",width:60,height:60,marginBottom:24,border:`3px solid ${T.spinner}`,borderTop:`3px solid ${T.spinnerTop}`,borderRadius:"50%",animation:"spin 0.9s linear infinite"}}/>
            <div style={{fontSize:16,color:T.spinnerTop,fontWeight:700,marginBottom:8}}>{LOADING_MSG}</div>
            {dartProgress && (
              <div style={{maxWidth:380,margin:"16px auto 0"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <span style={{fontSize:12,color:T.dartText}}>📡 DART 공시 매칭</span>
                  <span style={{fontSize:12,color:T.dartText}}>{dartProgress.done} / {dartProgress.total}개</span>
                </div>
                <div style={{height:6,background:T.dartBg,borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",borderRadius:3,background:"linear-gradient(90deg,#16a34a,#4ade80)",width:`${(dartProgress.done/dartProgress.total)*100}%`,transition:"width 0.3s"}}/>
                </div>
              </div>
            )}
          </div>
        )}

        {error && !loading && (
          <div style={{background:T.errorBg,border:`1px solid ${T.errorBorder}`,borderRadius:10,padding:"20px 24px",color:"#dc2626",maxWidth:640}}>
            <div style={{fontWeight:700,marginBottom:6,fontSize:14}}>⚠ 분석 오류</div>
            <div style={{fontSize:12,lineHeight:1.6,color:"#b91c1c"}}>{error}</div>
          </div>
        )}

        {data && !loading && (
          <div style={{animation:"fadeIn 0.5s ease"}}>
            {data.sourceNote && (
              <div style={{background:T.hintBg,border:`1px solid ${T.hintBorder}`,borderRadius:8,padding:"10px 16px",marginBottom:16,display:"flex",alignItems:"flex-start",gap:8}}>
                <span style={{fontSize:14,flexShrink:0}}>📄</span>
                <div>
                  <span style={{fontSize:11,fontWeight:700,color:T.hintText}}>참조 출처 </span>
                  <span style={{fontSize:11,color:T.text}}>{data.sourceNote}</span>
                </div>
              </div>
            )}
            <div style={{display:"flex",gap:12,marginBottom:24,flexWrap:"wrap"}}>
              {[
                {label:"카테고리",val:data.categories?.length||0},
                {label:"총 기업수",val:totalCos},
                {label:"상장사",val:data.categories?.reduce((s,c)=>s+(c.companies?.filter(co=>co.listed).length||0),0)||0},
                {label:"해외기업",val:data.categories?.reduce((s,c)=>s+(c.companies?.filter(co=>co.country&&co.country!=="KR").length||0),0)||0},
                ...(dartCount>0?[{label:"DART 검증",val:dartCount,green:true}]:[]),
              ].map(({label,val,green})=>(
                <div key={label} style={{
                  background:green?T.dartStatBg:T.statBg,
                  border:`1px solid ${green?T.dartStatBorder:T.statBorder}`,
                  borderRadius:10,padding:"12px 20px",textAlign:"center",
                }}>
                  <div style={{fontSize:24,fontWeight:900,color:green?T.dartStatVal:T.statVal}}>{val}</div>
                  <div style={{fontSize:10,color:T.subtext}}>{label}</div>
                </div>
              ))}
            </div>
            {data.categories?.map((cat,i)=>(
              <CategoryRow key={i} category={cat} periods={data.period||["'23","'24"]} index={i} T={T}
                onClickCompany={(co,cat)=>{setSelectedCompany(co);setSelectedCategory(cat);}}/>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
