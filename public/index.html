<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CHAINMAP — Supply Chain Intelligence</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #050c14; color: #c8e6ff; font-family: 'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif; }
input::placeholder { color: #3a5a7a; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #080f18; }
::-webkit-scrollbar-thumb { background: #1e3a5a; border-radius: 3px; }
@media print {
  @page { size: A4 landscape; margin: 12mm; }
  .no-print { display: none !important; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useRef } = React;

const CATEGORY_COLORS = [
  "#1a6b4a","#1a4a6b","#6b1a4a","#4a6b1a","#6b4a1a",
  "#2d4a7a","#7a2d4a","#4a7a2d","#7a4a2d","#2d7a6b",
];
const TAG_COLORS = {
  "OIS":"#e74c3c","FOLDED":"#e67e22","Encoder":"#f39c12","VCM":"#2ecc71",
  "LENS":"#3498db","BLUE FILTER":"#9b59b6","DRIVER IC":"#1abc9c",
  "모듈":"#16a085","소재":"#8e44ad","장비":"#2980b9","부품":"#27ae60",
  "완성품":"#c0392b","패키징":"#d35400",
};
const LOADING_MSGS = [
  "🔍 밸류체인 구조 분석 중...","🌐 글로벌 공급망 플레이어 탐색 중...",
  "📊 재무 데이터 수집 중 (상장/비상장)...","🏭 Upstream 기업 식별 중...",
  "🔗 Downstream 관계사 매핑 중...","💹 최근 2개년 실적 정리 중...",
  "⚡ 특이사항 및 이슈 분석 중...","🗺️ 밸류체인 맵 생성 중...",
];
const SYSTEM_PROMPT = `You are an expert financial research analyst specializing in global supply chain analysis.
When given a company name or sector, analyze the COMPLETE value chain from upstream to downstream.
Return ONLY a valid JSON object (no markdown, no backticks, no preamble). Use this EXACT structure:
{
  "target": "분석 대상명",
  "period": ["'23", "'24"],
  "summary": "한 줄 산업 요약",
  "categories": [
    {
      "name": "카테고리명",
      "colorHex": "#2D6A4F",
      "position": "upstream",
      "companies": [
        {
          "name": "기업명 (공식 상호 그대로)",
          "listed": true,
          "exchange": "KOSPI",
          "country": "KR",
          "tags": ["태그1","태그2"],
          "financials": {"revenue": [12345, 13000],"operatingProfit": [1200, 1500],"netIncome": [900, 1100]},
          "notes": "특이사항"
        }
      ]
    }
  ]
}
RULES: values in 억원; null for unknown (not 0); 4-10 companies per category; cover KR+global; position: upstream|midstream|downstream|core; return ONLY JSON.`;

const DART_BASE = "https://opendart.fss.or.kr/api";
async function dartGetCorpCode(key, name) {
  try {
    const r = await fetch(`${DART_BASE}/list.json?crtfc_key=${key}&corp_name=${encodeURIComponent(name)}&page_count=1&sort=date&sort_mth=desc`);
    const j = await r.json();
    return j.status === "000" && j.list?.length ? j.list[0].corp_code : null;
  } catch { return null; }
}
async function dartGetFinancials(key, corpCode, year) {
  try {
    const r = await fetch(`${DART_BASE}/fnlttSinglAcnt.json?crtfc_key=${key}&corp_code=${corpCode}&bsns_year=${year}&reprt_code=11011`);
    const j = await r.json();
    if (j.status !== "000" || !j.list) return null;
    const find = (...kws) => {
      for (const kw of kws) {
        const row = j.list.find(x => x.account_nm?.trim() === kw && x.fs_div === "CFS")
                 || j.list.find(x => x.account_nm?.trim() === kw);
        if (row) return Math.round(parseInt(row.thstrm_amount?.replace(/,/g,"") || "0") / 1e8);
      }
      return null;
    };
    return {
      revenue: find("매출액","수익(매출액)","영업수익","매출"),
      operatingProfit: find("영업이익","영업이익(손실)"),
      netIncome: find("당기순이익","당기순이익(손실)","분기순이익"),
    };
  } catch { return null; }
}
async function enrichWithDart(key, parsed, onProgress) {
  const clone = JSON.parse(JSON.stringify(parsed));
  const koreans = clone.categories.flatMap((cat, ci) =>
    (cat.companies || []).map((co, coi) => ({ co, ci, coi }))
  ).filter(({ co }) => co.country === "KR");
  let done = 0;
  await Promise.all(koreans.map(async ({ co, ci, coi }) => {
    const corpCode = await dartGetCorpCode(key, co.name);
    if (corpCode) {
      const [f23, f24] = await Promise.all([
        dartGetFinancials(key, corpCode, 2023),
        dartGetFinancials(key, corpCode, 2024),
      ]);
      if (f23 || f24) {
        clone.categories[ci].companies[coi].financials = {
          revenue: [f23?.revenue??null, f24?.revenue??null],
          operatingProfit: [f23?.operatingProfit??null, f24?.operatingProfit??null],
          netIncome: [f23?.netIncome??null, f24?.netIncome??null],
        };
        clone.categories[ci].companies[coi].dartVerified = true;
      }
    }
    done++; onProgress(done, koreans.length);
  }));
  return clone;
}

const fmt = n => n == null ? "-" : Math.abs(n) >= 10000 ? (n/10000).toFixed(1)+"조" : n.toLocaleString("ko-KR");
const FLAG = { US:"🇺🇸", JP:"🇯🇵", CN:"🇨🇳", TW:"🇹🇼", DE:"🇩🇪", NL:"🇳🇱" };

function CompanyCard({ company, periods }) {
  const { name, listed, exchange, country, tags, financials, notes, dartVerified } = company;
  const rows = [
    { v: financials?.revenue, bg:"#1a4a7a" },
    { v: financials?.operatingProfit, bg:"#1a6b4a" },
    { v: financials?.netIncome, bg:"#4a1a6b" },
  ];
  return (
    <div style={{background:"#0f1923",border:`1px solid ${dartVerified?"#1a5a2a":"#1e3048"}`,borderRadius:8,padding:"10px 12px",minWidth:158,maxWidth:198,flex:"0 0 auto",position:"relative",cursor:"pointer",transition:"border-color 0.2s",animation:"fadeIn 0.3s ease"}}
      onMouseEnter={e=>e.currentTarget.style.borderColor="#4a9eff"}
      onMouseLeave={e=>e.currentTarget.style.borderColor=dartVerified?"#1a5a2a":"#1e3048"}>
      {dartVerified && <div style={{position:"absolute",top:4,right:4,background:"#0d3a1a",border:"1px solid #1a6b2a",color:"#3adf7a",fontSize:8,padding:"1px 4px",borderRadius:3,fontWeight:800}}>DART</div>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
        <div style={{fontWeight:700,fontSize:12,color:"#e8f4ff",lineHeight:1.3,flex:1,paddingRight:dartVerified?28:0}}>{name}</div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2,marginLeft:4}}>
          {listed && <span style={{background:"#1a4a7a",color:"#7ab3e0",fontSize:9,padding:"1px 4px",borderRadius:3,fontWeight:600,whiteSpace:"nowrap"}}>{exchange||"상장"}</span>}
          {country && country!=="KR" && <span style={{fontSize:10}}>{FLAG[country]||"🌐"}</span>}
        </div>
      </div>
      {tags?.length > 0 && (
        <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:8}}>
          {tags.slice(0,3).map((t,i)=><span key={i} style={{background:TAG_COLORS[t]||"#2d4a6b",color:"#fff",fontSize:9,padding:"1px 5px",borderRadius:3,fontWeight:700}}>{t}</span>)}
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"14px 1fr 1fr",gap:2,marginBottom:4}}>
        <div/>
        {periods.map((p,i)=><div key={i} style={{fontSize:9,color:"#5a8aaa",textAlign:"right",fontWeight:600}}>{p}</div>)}
      </div>
      {rows.map(({v,bg},ri)=>(
        <div key={ri} style={{display:"grid",gridTemplateColumns:"14px 1fr 1fr",gap:2,marginBottom:3}}>
          <span style={{width:12,height:12,borderRadius:2,background:bg,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#fff",fontWeight:700}}>{ri+1}</span>
          {[0,1].map(i=>{const val=v?.[i];return <div key={i} style={{fontSize:10,textAlign:"right",fontWeight:600,color:val<0?"#e74c3c":val==null?"#2a4a5a":"#c8e6ff"}}>{fmt(val)}</div>;})}
        </div>
      ))}
      {notes && <div style={{marginTop:7,paddingTop:6,borderTop:"1px solid #1e3048",fontSize:9,color:"#7a9ab0",lineHeight:1.4}}>{notes}</div>}
    </div>
  );
}

function CategoryRow({ category, periods, index }) {
  const color = category.colorHex || CATEGORY_COLORS[index % CATEGORY_COLORS.length];
  const posLabel = {upstream:"▲ 상류",midstream:"◆ 중류",downstream:"▼ 하류",core:"★ 핵심"}[category.position]||category.position;
  return (
    <div style={{marginBottom:20,animation:"fadeIn 0.4s ease"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
        <div style={{background:color,color:"#fff",padding:"6px 14px",borderRadius:"6px 6px 0 0",fontSize:13,fontWeight:800,letterSpacing:2,minWidth:80,textAlign:"center"}}>{category.name}</div>
        <div style={{fontSize:10,color:"#4a7aaa",background:"#0a1520",padding:"3px 8px",borderRadius:4,border:"1px solid #1e3048"}}>{posLabel}</div>
        <div style={{fontSize:10,color:"#3a5a7a"}}>기업 {category.companies?.length||0}개</div>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,padding:"12px",background:"#080f18",borderRadius:"0 8px 8px 8px",border:`1px solid ${color}40`,borderLeft:`3px solid ${color}`}}>
        {category.companies?.map((co,i)=><CompanyCard key={i} company={co} periods={periods}/>)}
        {!category.companies?.length && <div style={{color:"#3a5a7a",fontSize:12,padding:20}}>데이터 없음</div>}
      </div>
    </div>
  );
}

function Legend({ periods }) {
  return (
    <div style={{display:"flex",gap:16,flexWrap:"wrap",alignItems:"center",padding:"10px 16px",background:"#080f18",border:"1px solid #1e3048",borderRadius:8,marginBottom:20}}>
      <span style={{fontSize:10,color:"#5a8aaa",fontWeight:700}}>(단위: 억원)</span>
      {[{n:1,l:"매출",bg:"#1a4a7a"},{n:2,l:"영업이익",bg:"#1a6b4a"},{n:3,l:"당기순익",bg:"#4a1a6b"}].map(({n,l,bg})=>(
        <div key={n} style={{display:"flex",alignItems:"center",gap:4}}>
          <span style={{width:16,height:16,background:bg,borderRadius:3,color:"#fff",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700}}>{n}</span>
          <span style={{fontSize:10,color:"#7aaac0"}}>{l}</span>
        </div>
      ))}
      <div style={{display:"flex",alignItems:"center",gap:4,marginLeft:8,borderLeft:"1px solid #1e3048",paddingLeft:12}}>
        <span style={{background:"#0d3a1a",border:"1px solid #1a6b2a",color:"#3adf7a",fontSize:9,padding:"1px 5px",borderRadius:3,fontWeight:800}}>DART</span>
        <span style={{fontSize:10,color:"#4a8a5a"}}>실제 공시 재무</span>
      </div>
      <div style={{marginLeft:"auto",display:"flex",gap:10}}>
        {periods.map((p,i)=><span key={i} style={{fontSize:10,color:"#4a9eff",fontWeight:700}}>{p}</span>)}
      </div>
    </div>
  );
}

function App() {
  const [input, setInput] = useState("");
  const [dartKey, setDartKey] = useState("");
  const [showSettings, setShowSettings] = useState(false);
  const [loading, setLoading] = useState(false);
  const [loadingMsg, setLoadingMsg] = useState("");
  const [dartProgress, setDartProgress] = useState(null);
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const [msgIdx, setMsgIdx] = useState(0);
  const timerRef = useRef(null);

  const analyze = useCallback(async () => {
    if (!input.trim()) return;
    setLoading(true); setError(null); setData(null); setDartProgress(null);
    let idx = 0;
    setLoadingMsg(LOADING_MSGS[0]);
    timerRef.current = setInterval(() => {
      idx = (idx+1) % LOADING_MSGS.length;
      setMsgIdx(idx);
      setLoadingMsg(LOADING_MSGS[idx]);
    }, 1800);
    try {
      const res = await fetch("/api/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:8000, system:SYSTEM_PROMPT,
          tools:[{type:"web_search_20250305",name:"web_search"}],
          messages:[{role:"user",content:`분석 대상: ${input.trim()}\n\n전체 공급망(밸류체인)을 분석해줘. 상장사/비상장사 모두 포함, 국내외 주요 플레이어 빠짐없이, 최근 재무 데이터를 웹 검색으로 채워줘.`}],
        }),
      });
      const result = await res.json();
      if (!res.ok) throw new Error(result.error?.message || "API 오류");
      const raw = result.content.filter(b=>b.type==="text").map(b=>b.text).join("");
      const s = raw.indexOf("{"), e = raw.lastIndexOf("}");
      if (s===-1||e===-1) throw new Error("JSON 파싱 실패");
      let jsonStr = raw.slice(s, e+1);
      let parsed;
      try {
        parsed = JSON.parse(jsonStr);
      } catch(_) {
        // 백틱/마크다운 제거 후 재시도
        jsonStr = jsonStr.replace(/`/g,"").replace(/^[^{]*/,"").replace(/[^}]*$/,"");
        parsed = JSON.parse(jsonStr);
      }
      if (dartKey.trim()) {
        clearInterval(timerRef.current);
        setLoadingMsg("📡 DART 공시 데이터 매칭 중...");
        const korCount = parsed.categories.flatMap(c=>c.companies||[]).filter(co=>co.country==="KR").length;
        if (korCount > 0) {
          setDartProgress({done:0,total:korCount});
          parsed = await enrichWithDart(dartKey.trim(), parsed, (done,total)=>setDartProgress({done,total}));
        }
      }
      setData(parsed);
    } catch(err) {
      setError(err.message);
    } finally {
      clearInterval(timerRef.current);
      setLoading(false); setDartProgress(null);
    }
  }, [input, dartKey]);

  const dartCount = data?.categories?.flatMap(c=>c.companies||[]).filter(co=>co.dartVerified).length||0;
  const totalCos = data?.categories?.reduce((s,c)=>s+(c.companies?.length||0),0)||0;

  const exportPDF = useCallback(() => {
    window.print();
  }, []);

  return (
    <div style={{minHeight:"100vh",background:"#050c14"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(180deg,#0a1828 0%,#050c14 100%)",borderBottom:"1px solid #1e3048",padding:"16px 28px",display:"flex",alignItems:"center",gap:16,flexWrap:"wrap",position:"sticky",top:0,zIndex:100}}>
        <div>
          <div style={{fontSize:20,fontWeight:900,color:"#4a9eff",letterSpacing:3}}>CHAIN<span style={{color:"#e8f4ff"}}>MAP</span></div>
          <div style={{fontSize:9,color:"#3a6a9a",letterSpacing:2}}>SUPPLY CHAIN INTELLIGENCE</div>
        </div>
        <div style={{flex:1,maxWidth:480,display:"flex",gap:8,marginLeft:24}}>
          <input value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&!loading&&analyze()}
            placeholder="기업명 또는 섹터 (예: 삼성전자, 반도체, 2차전지)"
            style={{flex:1,background:"#0a1828",border:"1px solid #1e4a7a",borderRadius:8,padding:"9px 14px",color:"#e8f4ff",fontSize:13,outline:"none"}}/>
          <button onClick={analyze} disabled={loading||!input.trim()} style={{background:loading?"#1a3a5a":"linear-gradient(135deg,#1a6abf,#0d4a9a)",color:loading?"#5a8aaa":"#fff",border:"none",borderRadius:8,padding:"9px 24px",fontSize:13,fontWeight:700,cursor:loading?"not-allowed":"pointer",whiteSpace:"nowrap"}}>
            {loading?"분석 중...":"분석"}
          </button>
        </div>
        <button onClick={()=>setShowSettings(v=>!v)} className="no-print" style={{background:showSettings?"#0d3a1a":"#0a1520",border:`1px solid ${showSettings?"#1a6b2a":"#1e3048"}`,color:showSettings?"#3adf7a":"#5a8aaa",borderRadius:8,padding:"8px 14px",fontSize:12,cursor:"pointer",fontWeight:700}}>
          ⚙ DART {dartKey?"✓ 연동":"미설정"}
        </button>
        {data && (
          <button onClick={exportPDF} className="no-print" style={{background:"linear-gradient(135deg,#7a1a1a,#a02020)",color:"#ffcccc",border:"1px solid #4a1a1a",borderRadius:8,padding:"8px 16px",fontSize:12,cursor:"pointer",fontWeight:700,whiteSpace:"nowrap"}}>
            📄 PDF 저장
          </button>
        )}
        {data && (
          <div style={{marginLeft:"auto",textAlign:"right"}}>
            <div style={{fontSize:18,fontWeight:900,color:"#e8f4ff"}}>{data.target}</div>
            <div style={{fontSize:10,color:"#4a7aaa"}}>{data.summary}</div>
          </div>
        )}
      </div>

      {/* DART Settings */}
      {showSettings && (
        <div style={{background:"#080f18",borderBottom:"1px solid #1e3048",padding:"14px 28px",display:"flex",alignItems:"flex-start",gap:20,flexWrap:"wrap"}}>
          <div>
            <div style={{fontSize:11,color:"#4a9eff",fontWeight:700,marginBottom:4}}>DART Open API Key</div>
            <div style={{fontSize:10,color:"#4a7aaa",lineHeight:1.8}}>
              1. opendart.fss.or.kr 접속 → 인증키 신청 (무료, 즉시 발급)<br/>
              2. 이메일 수신 후 아래 입력<br/>
              3. 분석 시 국내 기업 재무를 실제 공시로 자동 교체
            </div>
          </div>
          <div style={{flex:1,maxWidth:420}}>
            <input value={dartKey} onChange={e=>setDartKey(e.target.value)}
              placeholder="발급받은 DART API Key 입력 (40자리)"
              type="password"
              style={{width:"100%",background:"#0a1828",border:"1px solid #1e4a7a",borderRadius:8,padding:"9px 14px",color:"#e8f4ff",fontSize:12,outline:"none"}}/>
            {dartKey && <div style={{marginTop:6,fontSize:11,color:"#3adf7a"}}>✓ 설정됨 — 다음 분석부터 적용</div>}
          </div>
        </div>
      )}

      {/* Main */}
      <div style={{padding:"24px 28px"}}>
        {!loading && !data && !error && (
          <div style={{textAlign:"center",paddingTop:100,color:"#2a4a6a"}}>
            <div style={{fontSize:72,marginBottom:20,opacity:0.4}}>⬡</div>
            <div style={{fontSize:22,fontWeight:700,marginBottom:10,color:"#3a6a9a"}}>공급망 인텔리전스 플랫폼</div>
            <div style={{fontSize:14,color:"#2a5a7a",marginBottom:6}}>기업명 또는 섹터를 입력하면 전체 밸류체인을 자동 분석합니다</div>
            <div style={{fontSize:13,color:"#1a3a5a",marginBottom:24}}>삼성전자 · 현대자동차 · 반도체 · 2차전지 · K-뷰티 · 바이오 · 방산 · 조선</div>
            {!dartKey && (
              <div style={{display:"inline-block",padding:"12px 24px",background:"#0a1828",border:"1px solid #1e3a5a",borderRadius:10,fontSize:12,color:"#4a7aaa"}}>
                💡 <b style={{color:"#4a9eff"}}>⚙ DART 설정</b>에서 API Key를 입력하면 국내 기업 재무를 실제 공시로 검증합니다
              </div>
            )}
          </div>
        )}

        {loading && (
          <div style={{textAlign:"center",paddingTop:100}}>
            <div style={{display:"inline-block",width:60,height:60,marginBottom:24,border:"3px solid #1e3048",borderTop:"3px solid #4a9eff",borderRadius:"50%",animation:"spin 0.9s linear infinite"}}/>
            <div style={{fontSize:16,color:"#4a9eff",fontWeight:700,marginBottom:8}}>{loadingMsg}</div>
            {dartProgress && (
              <div style={{maxWidth:380,margin:"16px auto 0"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <span style={{fontSize:12,color:"#3adf7a"}}>📡 DART 공시 매칭</span>
                  <span style={{fontSize:12,color:"#4a8a5a"}}>{dartProgress.done} / {dartProgress.total}개</span>
                </div>
                <div style={{height:6,background:"#0d2a18",borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",borderRadius:3,background:"linear-gradient(90deg,#1a6b2a,#3adf7a)",width:`${(dartProgress.done/dartProgress.total)*100}%`,transition:"width 0.3s"}}/>
                </div>
              </div>
            )}
            <div style={{marginTop:28,display:"flex",justifyContent:"center",gap:7}}>
              {LOADING_MSGS.map((_,i)=>(
                <div key={i} style={{width:7,height:7,borderRadius:"50%",background:i===msgIdx?"#4a9eff":"#1e3048",transition:"background 0.3s"}}/>
              ))}
            </div>
          </div>
        )}

        {error && !loading && (
          <div style={{background:"#1a0a0a",border:"1px solid #4a1a1a",borderRadius:10,padding:"20px 24px",color:"#e74c3c",maxWidth:640}}>
            <div style={{fontWeight:700,marginBottom:6,fontSize:14}}>⚠ 분석 오류</div>
            <div style={{fontSize:12,lineHeight:1.6}}>{error}</div>
            {error.includes("API Key") && (
              <div style={{marginTop:10,fontSize:11,color:"#aa5555"}}>
                → config.json 파일을 열어 YOUR_API_KEY_HERE 자리에 실제 API Key를 입력하고 서버를 재시작하세요.
              </div>
            )}
          </div>
        )}

        {data && !loading && (
          <div style={{animation:"fadeIn 0.5s ease"}}>
            <Legend periods={data.period||["'23","'24"]}/>
            <div style={{display:"flex",gap:12,marginBottom:24,flexWrap:"wrap"}}>
              {[
                {label:"카테고리",val:data.categories?.length||0},
                {label:"총 기업수",val:totalCos},
                {label:"상장사",val:data.categories?.reduce((s,c)=>s+(c.companies?.filter(co=>co.listed).length||0),0)||0},
                {label:"해외기업",val:data.categories?.reduce((s,c)=>s+(c.companies?.filter(co=>co.country&&co.country!=="KR").length||0),0)||0},
                ...(dartCount>0?[{label:"DART 검증",val:dartCount,green:true}]:[]),
              ].map(({label,val,green})=>(
                <div key={label} style={{background:green?"#0a2a14":"#080f18",border:`1px solid ${green?"#1a6b2a":"#1e3048"}`,borderRadius:10,padding:"12px 20px",textAlign:"center"}}>
                  <div style={{fontSize:24,fontWeight:900,color:green?"#3adf7a":"#4a9eff"}}>{val}</div>
                  <div style={{fontSize:10,color:green?"#4a8a5a":"#5a8aaa"}}>{label}</div>
                </div>
              ))}
            </div>
            {data.categories?.map((cat,i)=>(
              <CategoryRow key={i} category={cat} periods={data.period||["'23","'24"]} index={i}/>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
